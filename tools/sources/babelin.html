<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="icon" type="image/png" href="/mochi.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF14 探索筆記追蹤器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
:root{
  --bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--border:#2a3050;
  --gold:#c8a96e;--gold2:#e8cc90;--text:#cdd3e0;--text2:#8890a8;
  --green:#4a9e6e;--green2:#6fcf97;--blue:#4a7ec0;--purple:#9b7fd4;
  --red:#c0392b;--yellow:#d4a437;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

/* ── Header ── */
header{background:linear-gradient(135deg,#0a0c10,#1a1e2e);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.emblem{width:36px;height:36px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--gold);flex-shrink:0;}
header h1{font-family:'Cinzel',serif;font-size:1.05rem;color:var(--gold);letter-spacing:.1em;}
header .sub{font-size:.72rem;color:var(--text2);margin-top:2px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.et-block{display:flex;align-items:center;gap:5px;}
.et-label{font-size:.7rem;color:var(--text2);}
.et-clock{font-family:monospace;font-size:1.1rem;color:var(--gold2);font-weight:bold;}

/* ── Layout ── */
.layout{max-width:1100px;margin:0 auto;padding:18px 14px;display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:start;}

/* ── Sidebar ── */
.sidebar{display:flex;flex-direction:column;gap:10px;position:sticky;top:14px;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.panel-title{background:var(--bg3);border-bottom:1px solid var(--border);padding:7px 13px;font-size:.65rem;letter-spacing:.14em;color:var(--gold);font-family:'Cinzel',serif;text-transform:uppercase;}
.ver-btn{width:100%;background:transparent;border:none;border-bottom:1px solid #1c2138;padding:8px 16px;text-align:left;color:var(--text2);font-family:'Noto Sans TC',sans-serif;font-size:.82rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.ver-btn:last-child{border-bottom:none;}
.ver-btn:hover{background:var(--bg3);color:var(--text);}
.ver-btn.active{background:rgba(200,169,110,.1);color:var(--gold2);border-left:3px solid var(--gold);}
.ver-badge{font-size:.65rem;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;}
.ver-btn.active .ver-badge{color:var(--gold);border-color:rgba(200,169,110,.3);}

/* progress in sidebar */
.progress-box{padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
.progress-row{display:flex;align-items:center;justify-content:space-between;font-size:.75rem;}
.progress-label{color:var(--text2);}
.progress-count{color:var(--gold);font-weight:500;}
.progress-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .5s;}
.sidebar-btns{display:flex;flex-direction:column;gap:6px;padding:0;}
.ctrl-btn{width:100%;background:transparent;border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text2);font-size:.75rem;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;text-align:left;}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold);}
.ctrl-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(74,126,192,.08);}

/* sort */
.sort-row{display:flex;gap:5px;flex-wrap:wrap;}
.sort-btn{flex:1;padding:5px 4px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.7rem;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;text-align:center;white-space:nowrap;}
.sort-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,.08);}

/* ── Main ── */
.main-area{display:flex;flex-direction:column;gap:12px;min-width:0;}

/* ── Now/Soon 膠囊按鈕區 ── */
.now-section{display:flex;flex-direction:column;gap:6px;}
.now-header{font-size:.62rem;letter-spacing:.14em;color:var(--green2);font-family:'Cinzel',serif;text-transform:uppercase;padding:0 2px;}
.now-pills{display:flex;flex-wrap:wrap;gap:6px;}
.now-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;background:#0e2318;border:1px solid rgba(74,158,110,.5);cursor:pointer;transition:all .2s;}
.now-pill:hover{background:#152d22;border-color:var(--green2);}
.now-dot{width:6px;height:6px;border-radius:50%;background:var(--green2);box-shadow:0 0 5px var(--green2);flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.now-pill-id{font-size:.65rem;color:var(--text2);font-family:monospace;}
.now-pill-name{font-size:.78rem;color:var(--green2);font-weight:500;}

/* soon */
.soon-header{font-size:.62rem;letter-spacing:.14em;color:var(--yellow);font-family:'Cinzel',serif;text-transform:uppercase;padding:0 2px;margin-top:2px;}
.soon-pills{display:flex;flex-wrap:wrap;gap:6px;}
.soon-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;background:#1c1806;border:1px solid rgba(212,164,55,.35);cursor:pointer;transition:all .2s;}
.soon-pill:hover{background:#252009;border-color:var(--yellow);}
.soon-dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.soon-pill-id{font-size:.65rem;color:var(--text2);font-family:monospace;}
.soon-pill-name{font-size:.78rem;color:var(--gold2);}
.soon-pill-time{font-size:.68rem;color:var(--yellow);font-family:monospace;margin-left:2px;}

/* divider */
.divider{height:1px;background:var(--border);margin:4px 0;}
.all-header{font-size:.65rem;letter-spacing:.14em;color:var(--text2);font-family:'Cinzel',serif;text-transform:uppercase;padding:0 2px;}

/* ── Entry cards ── */
.entry-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,background .2s;}
.entry-card:hover{border-color:rgba(200,169,110,.4);background:var(--bg3);}
.entry-card.done{opacity:.38;}
.check-circle{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.7rem;color:transparent;}
.entry-card.done .check-circle{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.entry-body{flex:1;min-width:0;}
.entry-top{display:flex;align-items:baseline;gap:7px;margin-bottom:3px;}
.entry-id{font-size:.65rem;color:var(--text2);font-family:monospace;}
.entry-zone{font-size:.65rem;color:var(--text2);}
.entry-title{font-size:.88rem;color:var(--text);font-weight:500;}
.entry-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px;}
.tag{padding:1px 7px;border-radius:3px;font-size:.68rem;}
.tag-weather{background:rgba(74,126,192,.12);border:1px solid rgba(74,126,192,.25);color:#7eb8f0;}
.tag-time{background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.2);color:var(--gold);}
.tag-emote{background:rgba(155,127,212,.1);border:1px solid rgba(155,127,212,.25);color:#b8a0e8;}
.tag-coords{background:rgba(74,126,192,.08);border:1px solid rgba(74,126,192,.2);color:var(--blue);cursor:pointer;}
.tag-coords:hover{background:rgba(74,126,192,.18);}
.tag-note{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.25);color:#e07070;font-size:.65rem;}
.entry-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.next-label{font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;}
.next-time{font-size:.88rem;font-weight:bold;font-family:monospace;}
.next-time.now{color:var(--green2);}
.next-time.soon{color:var(--yellow);}
.next-time.later{color:var(--text2);}

/* ── WIP ── */
.wip{text-align:center;padding:60px 20px;color:var(--text2);}
.wip-icon{font-size:2.5rem;margin-bottom:12px;}
.wip-title{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em;margin-bottom:8px;}
.wip-sub{font-size:.8rem;line-height:1.6;}

/* ── HW+ 地圖 Pin 模式 ── */
.zone-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.zone-header2{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:10px;}
.zone-name2{font-size:.85rem;color:var(--gold);font-weight:500;}
.zone-count{margin-left:auto;font-size:.7rem;color:var(--text2);}
.map-wrap2{position:relative;width:100%;background:#060e1a;overflow:hidden;aspect-ratio:1;}
.map-wrap2 img{width:100%;height:100%;object-fit:cover;display:block;opacity:.88;}
.pin-layer{position:absolute;inset:0;}
.sight-pin2{position:absolute;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.pin-dot2{width:18px;height:18px;border-radius:50%;background:var(--gold);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.7),0 0 8px rgba(200,169,110,.4);display:flex;align-items:center;justify-content:center;font-size:.5rem;color:var(--bg);font-weight:700;font-family:monospace;transition:transform .15s;}
.sight-pin2:hover .pin-dot2{transform:scale(1.25);}
.pin-num{font-size:.55rem;color:var(--gold2);font-family:monospace;background:rgba(13,15,20,.8);padding:1px 3px;border-radius:2px;white-space:nowrap;}
.aeth-pin2{position:absolute;transform:translate(-50%,-50%);font-size:.85rem;cursor:default;z-index:2;}
.aeth-label2{position:absolute;transform:translateX(-50%);top:16px;background:rgba(74,126,192,.9);color:#fff;font-size:.52rem;padding:1px 4px;border-radius:3px;white-space:nowrap;pointer-events:none;}gap:4px;padding:10px 12px;}
.sight-item{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);font-size:.75rem;color:var(--text2);cursor:pointer;transition:all .15s;}
.sight-item:hover{border-color:var(--gold);color:var(--gold);}
.sight-item-num{font-family:monospace;color:var(--text2);font-size:.65rem;}
.sight-item-coord{font-family:monospace;font-size:.68rem;}
.sight-item-emote{font-size:.65rem;padding:1px 5px;border-radius:3px;background:rgba(155,127,212,.1);border:1px solid rgba(155,127,212,.25);color:#b8a0e8;}

/* ── Map Modal ── */
.map-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.map-overlay.open{display:flex;}
.map-modal{background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:12px;width:min(800px,95vw);max-height:95vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7);animation:modal-in .18s ease;}
@keyframes modal-in{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.map-modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.map-modal-title{font-size:.95rem;color:var(--gold);font-weight:500;}
.map-modal-sub{font-size:.72rem;color:var(--text2);margin-top:3px;}
.map-close{background:none;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer;padding:2px 6px;line-height:1;transition:color .2s;}
.map-close:hover{color:var(--text);}
.map-wrap{position:relative;width:100%;background:#060e1a;overflow:auto;flex:1;}
.map-wrap.is-map{aspect-ratio:1;overflow:hidden;}
.map-wrap.is-map img{width:100%;height:100%;object-fit:cover;display:block;opacity:.88;}
.map-wrap.is-screenshot img{display:block;width:100%;height:auto;max-height:75vh;object-fit:contain;opacity:.95;}
.map-pin-layer{position:absolute;inset:0;}
.sight-pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;}
.sight-pin-dot{width:24px;height:24px;border-radius:50% 50% 50% 0;background:var(--gold);border:2px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.7),0 0 12px rgba(200,169,110,.4);transform:rotate(-45deg);}
.aeth-pin{position:absolute;transform:translate(-50%,-50%);font-size:.9rem;}
.aeth-label{position:absolute;transform:translateX(-50%);background:rgba(74,126,192,.9);color:#fff;font-size:.55rem;padding:1px 5px;border-radius:3px;white-space:nowrap;}
.map-modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.map-coord-txt{font-size:.78rem;color:var(--text2);font-family:monospace;}
.map-aeth-txt{font-size:.78rem;color:var(--blue);}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);color:var(--gold);padding:7px 20px;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:2000;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="emblem">👁</div>
  <div>
    <h1>探索筆記追蹤器</h1>

  </div>
  <div class="header-right">
    <div class="et-block">
      <span class="et-label">ET</span>
      <span class="et-clock" id="etClock">00:00</span>
    </div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">版本</div>
      <button class="ver-btn active" onclick="setVer('arr',this)">
        2.x 新生艾歐澤亞<span class="ver-badge" id="badge-arr">80</span>
      </button>
      <button class="ver-btn" onclick="setVer('hw',this)">
        3.x 蒼天伊修加德<span class="ver-badge" id="badge-hw">62</span>
      </button>
      <button class="ver-btn" onclick="setVer('sb',this)">
        4.x 紅蓮解放者<span class="ver-badge" id="badge-sb">62</span>
      </button>
      <button class="ver-btn" onclick="setVer('shb',this)">
        5.x 漆黑反叛者<span class="ver-badge" id="badge-shb">45</span>
      </button>
      <button class="ver-btn" onclick="setVer('ew',this)">
        6.x 曉月之終途<span class="ver-badge" id="badge-ew">46</span>
      </button>
      <button class="ver-btn" onclick="setVer('dt',this)">
        7.x 黃金遺產<span class="ver-badge" id="badge-dt">45</span>
      </button>
    </div>

    <div class="panel">
      <div class="panel-title">進度</div>
      <div class="progress-box">
        <div class="progress-row">
          <span class="progress-label">本版本完成</span>
          <span class="progress-count" id="progressCount">0 / 80</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
      <div id="doneList" style="max-height:180px;overflow-y:auto;border-top:1px solid var(--border);"></div>
    </div>

    <div class="panel">
      <div class="panel-title">顯示</div>
      <div style="padding:10px 12px;display:flex;flex-direction:column;gap:7px;">
        <div class="sort-row">
          <button class="sort-btn active" onclick="setSort('id',this)">編號</button>
          <button class="sort-btn" onclick="setSort('time',this)">時間</button>
          <button class="sort-btn" onclick="setSort('zone',this)">地區</button>
        </div>
        <button class="ctrl-btn" id="hideBtn" onclick="toggleHide()">☐ 隱藏已完成</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-area" id="mainArea"></div>
</div>

<!-- Map Modal -->
<div class="map-overlay" id="mapOverlay" onclick="closeMap(event)">
  <div class="map-modal" onclick="event.stopPropagation()">
    <div class="map-modal-header">
      <div>
        <div class="map-modal-title" id="mapTitle">地圖</div>
        <div class="map-modal-sub" id="mapSub"></div>
      </div>
      <button class="map-close" onclick="closeMapBtn()">✕</button>
    </div>
    <div class="map-wrap">
      <img id="mapImg" src="" alt="">
      <div class="map-pin-layer" id="mapPins"></div>
    </div>
    <div class="map-modal-footer">
      <span class="map-coord-txt" id="mapCoord"></span>
      <button id="mapVideoBtn" style="display:none;padding:5px 14px;border-radius:20px;background:rgba(0,120,255,.15);border:1px solid rgba(0,120,255,.4);color:#60a5fa;font-size:.75rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">▶ 教學影片</button>
      <button id="mapDoneBtn" onclick="mapDone()" style="display:none;margin-left:auto;padding:6px 16px;border-radius:20px;background:rgba(74,158,110,.15);border:1px solid rgba(74,158,110,.5);color:var(--green2);font-size:.78rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;">✓ 標記完成</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">已複製座標</div>

<script src="et.js"></script>
<script>
// ══ ET 系統 ══
function toET(ms) {
  const s = ms / 1000 * E_CONST;
  return { h: Math.floor(s / 3600) % 24, m: Math.floor(s / 60) % 60 };
}
function weatherSeed(ms) {
  const s = Math.floor(ms / 1000);
  const base = ((s / 175 + 8 - (s / 175) % 8) % 24);
  let k = (Math.floor(s / 4200)) >>> 0;
  const chunk = k * 100 + base;
  let x = (chunk << 11 ^ chunk) >>> 0;
  return ((x >>> 8 ^ x) >>> 0) % 100;
}

// ══ 天氣表 ══
const ZONES = {
  limsa:             {name:"利姆薩·羅敏薩",   rates:[{r:20,w:"Cloudy"},{r:50,w:"ClearSkies"},{r:80,w:"FairSkies"},{r:90,w:"Fog"},{r:100,w:"Rain"}]},

  lower_la:          {name:"低地拉諾西亞",     rates:[{r:20,w:"Cloudy"},{r:50,w:"ClearSkies"},{r:70,w:"FairSkies"},{r:80,w:"Wind"},{r:90,w:"Fog"},{r:100,w:"Rain"}]},
  eastern_la:        {name:"東拉諾西亞",       rates:[{r:5,w:"Fog"},{r:50,w:"ClearSkies"},{r:80,w:"FairSkies"},{r:90,w:"Cloudy"},{r:95,w:"Rain"},{r:100,w:"Showers"}]},
  western_la:        {name:"西拉諾西亞",       rates:[{r:10,w:"Fog"},{r:40,w:"ClearSkies"},{r:60,w:"FairSkies"},{r:80,w:"Cloudy"},{r:90,w:"Wind"},{r:100,w:"Gales"}]},
  upper_la:          {name:"高地拉諾西亞",     rates:[{r:30,w:"ClearSkies"},{r:50,w:"FairSkies"},{r:70,w:"Cloudy"},{r:80,w:"Fog"},{r:90,w:"Thunder"},{r:100,w:"Thunderstorms"}]},
  outer_la:          {name:"外地拉諾西亞",     rates:[{r:30,w:"ClearSkies"},{r:50,w:"FairSkies"},{r:70,w:"Cloudy"},{r:85,w:"Fog"},{r:100,w:"Rain"}]},
  gridania:          {name:"格里達尼亞",       rates:[{r:20,w:"Rain"},{r:30,w:"Fog"},{r:40,w:"Cloudy"},{r:55,w:"FairSkies"},{r:85,w:"ClearSkies"},{r:100,w:"FairSkies"}]},
  central_shroud:    {name:"黑衣森林中央林區", rates:[{r:5,w:"Thunder"},{r:20,w:"Rain"},{r:30,w:"Fog"},{r:40,w:"Cloudy"},{r:55,w:"FairSkies"},{r:85,w:"ClearSkies"},{r:100,w:"FairSkies"}]},
  east_shroud:       {name:"黑衣森林東部林區", rates:[{r:5,w:"Thunder"},{r:20,w:"Rain"},{r:30,w:"Fog"},{r:40,w:"Cloudy"},{r:55,w:"FairSkies"},{r:85,w:"ClearSkies"},{r:100,w:"FairSkies"}]},

// ══ 邏輯 ══
function getWeather(zoneKey, ms) {
  const z = ZONES[zoneKey]; if (!z) return 'Unknown';
  const seed = weatherSeed(ms);
  for (const r of z.rates) if (seed < r.r) return r.w;
  return 'Unknown';
}
function inTime(h, s, e) {
  return s < e ? h >= s && h < e : h >= s || h < e;
}
function isNow(item) {
  const ms = now();
  const w = getWeather(item.zone, ms);
  if (!item.weather.includes(w)) return false;
  return inTime(toET(ms).h, item.timeStart, item.timeEnd);
}
function findNext(item) {
  const nowMs = now();
  const SLOT = 1400000;
  let slot = Math.floor(nowMs / SLOT) * SLOT;
  for (let i = 0; i < 2000; i++) {
    const ms = slot + i * SLOT;
    const w = getWeather(item.zone, ms);
    if (item.weather.includes(w)) {
      const etS = ms / 1000 * E_CONST;
      const baseH = Math.floor(etS / 3600) % 24;
      for (let dh = 0; dh < 8; dh++) {
        const h = (baseH + dh) % 24;
        if (inTime(h, item.timeStart, item.timeEnd)) {
          const windowMs = ms + dh * 3600 / E_CONST * 1000;
          if (windowMs >= nowMs) return windowMs;
        }
      }
    }
  }
  return null;
}
function fmtCountdown(ms) {
  const diff = ms - now();
  if (diff <= 0) return { text:'現在可去', cls:'now' };
  const m = Math.floor(diff / 60000), h = Math.floor(m / 60), rm = m % 60;
  return { text: h > 0 ? `${h}h ${rm}m` : `${rm}m後`, cls: m < 30 ? 'soon' : 'later' };
}
function fmtRange(s, e) {
  const ep = e === 0 ? 23 : e - 1 < 0 ? 23 : e - 1;
  return `${String(s).padStart(2,'0')}:00–${String(ep).padStart(2,'0')}:59`;
}

// ══ 狀態 ══
let curVer = 'arr', sortMode = 'id', hideChecked = false, windows = {};
let checked = {};
function loadChecked() {
  try { checked = JSON.parse(localStorage.getItem('ff14_sight_checked') || '{}'); } catch { checked = {}; }
}
function saveChecked() { localStorage.setItem('ff14_sight_checked', JSON.stringify(checked)); }
function getChecked(ver) { return checked[ver] || []; }
function toggleCheck(ver, id) {
  if (!checked[ver]) checked[ver] = [];
  const i = checked[ver].indexOf(id);
  if (i >= 0) checked[ver].splice(i, 1); else checked[ver].push(id);
  saveChecked(); render();
}

const ARR_VERS = ['arr'];
function isHWPlus(ver) { return !ARR_VERS.includes(ver); }

function setVer(ver, btn) {
  curVer = ver;
  document.querySelectorAll('.ver-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (isHWPlus(ver)) { renderHW(); }
  else { computeWindows(); render(); }
}
function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function toggleHide() {
  hideChecked = !hideChecked;
  const btn = document.getElementById('hideBtn');
  btn.classList.toggle('active', hideChecked);
  btn.textContent = hideChecked ? '☑ 隱藏已完成' : '☐ 隱藏已完成';
  render();
}

function computeWindows() {
  windows = {};
  const data = ALL_DATA[curVer] || [];
  data.forEach(d => { windows[d.id] = findNext(d); });
}

function getSorted() {
  const data = ALL_DATA[curVer] || [];
  const done = getChecked(curVer);
  let list = hideChecked ? data.filter(d => !done.includes(d.id)) : [...data];
  if (sortMode === 'id') list.sort((a,b) => parseInt(a.id) - parseInt(b.id));
  else if (sortMode === 'time') list.sort((a,b) => {
    const wa = windows[a.id], wb = windows[b.id];
    if (!wa) return 1; if (!wb) return -1; return wa - wb;
  });
  else list.sort((a,b) => {
    const za = ZONE_ORDER[a.zone]||99, zb = ZONE_ORDER[b.zone]||99;
    return za !== zb ? za - zb : parseInt(a.id) - parseInt(b.id);
  });
  return list;
}

function render() {
  const data = ALL_DATA[curVer] || [];
  const done = getChecked(curVer);

  // 進度
  document.getElementById('progressCount').textContent = `${done.length} / ${data.length}`;
  document.getElementById('progressFill').style.width = data.length ? `${done.length/data.length*100}%` : '0%';

  // 已完成清單
  const doneList = document.getElementById('doneList');
  if (done.length === 0) {
    doneList.innerHTML = '';
  } else {
    doneList.innerHTML = done.map(id => {
      const d = data.find(x => x.id === id);
      if (!d) return '';
      return `<div onclick="toggleCheck('${curVer}','${id}')" style="padding:5px 12px;font-size:.72rem;color:var(--text2);cursor:pointer;border-bottom:1px solid #1a1d30;display:flex;align-items:center;gap:6px;transition:background .15s;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
        <span style="color:var(--green);font-size:.65rem;">✓</span>
        <span style="font-family:monospace;font-size:.65rem;">${id}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.title}</span>
        <span style="color:var(--red);font-size:.65rem;flex-shrink:0;">✕</span>
      </div>`;
    }).join('');
  }

  const main = document.getElementById('mainArea');

  // WIP
  if (data.length === 0) {
    main.innerHTML = `<div class="wip"><div class="wip-icon">🔧</div><div class="wip-title">資料準備中</div><div class="wip-sub">本版本觀景筆記資料整理中<br>敬請期待</div></div>`;
    return;
  }

  const list = getSorted();
  const nowItems = data.filter(d => !done.includes(d.id) && isNow(d));
  const soonItems = data.filter(d => !done.includes(d.id) && !isNow(d) && windows[d.id] && (windows[d.id] - now()) < 30 * 60000);

  let html = '';

  // 現在可去 膠囊按鈕
  if (nowItems.length > 0) {
    html += `<div class="now-section"><div class="now-header">✦ 現在可以去</div><div class="now-pills">`;
    nowItems.forEach(d => {
      html += `<div class="now-pill" onclick="openMapWithDone('${curVer}','${d.id}','${d.zone}','${d.title}',${d.x},${d.y})">
        <div class="now-dot"></div>
        <span class="now-pill-id">${d.id}</span>
        <span class="now-pill-name">${d.title}</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 即將開放 膠囊按鈕
  if (soonItems.length > 0) {
    html += `<div class="now-section"><div class="soon-header">⏳ 即將開放</div><div class="soon-pills">`;
    soonItems.forEach(d => {
      const cd = fmtCountdown(windows[d.id]);
      html += `<div class="soon-pill" onclick="openMapWithDone('${curVer}','${d.id}','${d.zone}','${d.title}',${d.x},${d.y})">
        <div class="soon-dot"></div>
        <span class="soon-pill-id">${d.id}</span>
        <span class="soon-pill-name">${d.title}</span>
        <span class="soon-pill-time">${cd.text}</span>
      </div>`;
    });
    html += `</div></div>`;
  }
  if (nowItems.length > 0 || soonItems.length > 0) {
    html += `<div class="divider"></div><div class="all-header">全部景點</div>`;
  }

  // 全部卡片
  list.forEach(d => {
    const isDone = done.includes(d.id);
    const w = windows[d.id];
    const cd = w ? fmtCountdown(w) : { text:'–', cls:'later' };
    const isAvail = isNow(d);
    html += `<div class="entry-card${isDone?' done':''}" onclick="toggleCheck('${curVer}','${d.id}')">
      <div class="check-circle">✓</div>
      <div class="entry-body">
        <div class="entry-top">
          <span class="entry-id">No.${d.id}</span>
          <span class="entry-zone">${ZONES[d.zone]?.name||d.zone}</span>
        </div>
        <div class="entry-title">${d.title}${d.note?`<span class="tag tag-note" style="margin-left:6px">${d.note}</span>`:''}</div>
        <div class="entry-meta">
          <span class="tag tag-weather">${WEATHER_TC[d.weather[0]]||d.weather[0]}</span>
          <span class="tag tag-time">🕐 ${fmtRange(d.timeStart,d.timeEnd)}</span>
          <span class="tag tag-emote">${d.emote}</span>
          <span class="tag tag-coords" onclick="copyCoords(${d.x},${d.y},event)">X:${d.x} Y:${d.y}</span>
          <button class="map-btn-sm" onclick="openMap('${d.zone}','${d.title}',${d.x},${d.y},event,'${d.id}')">🗺</button>
        </div>
      </div>
      ${!isDone?`<div class="entry-right">
        <div class="next-label">Next Window</div>
        <div class="next-time ${isAvail?'now':cd.cls}">${isAvail?'現在！':cd.text}</div>
      </div>`:''}
    </div>`;
  });

  main.innerHTML = html;
}

function coordToPctHW(coord, zone) {
  const size = ZONE_SIZE[zone] || 41;
  return ((coord - 1) / size) * 100;
}

// HW+ Modal（簡易，只顯示資訊）
let _hwModal = null;
function openHWModal(item) {
  const overlay = document.getElementById('mapOverlay');
  document.getElementById('mapTitle').textContent = `No.${item.id}`;
  document.getElementById('mapSub').textContent = item.zone;
  document.getElementById('mapCoord').textContent = `X:${item.x}  Y:${item.y}  Z:${item.z}　　${item.emote}`;
  document.getElementById('mapVideoBtn').style.display = 'none';
  document.getElementById('mapDoneBtn').style.display = 'none';

  const isDTCity = ["圖萊尤拉","九號解決方案"].includes(item.zone);
  if (isDTCity) {
    const videoBtn = document.getElementById('mapVideoBtn');
    videoBtn.style.display = '';
    videoBtn.onclick = () => window.open(DT_CITY_VIDEO, '_blank');
    document.querySelector('.map-wrap').classList.remove('is-map','is-screenshot');
    document.getElementById('mapImg').src = '';
    document.getElementById('mapPins').innerHTML = '';
    document.getElementById('mapOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    return;
  }

  const mapUrl = XPLUS_ZONE_MAP_URL[item.zone];
  const mapWrap = document.querySelector('.map-wrap');
  const isScreenshot = ["黃金港","神拳痕","水晶都","遊末邦","舊薩雷安","拉札罕"].includes(item.zone);
  if (mapUrl) {
    document.getElementById('mapImg').src = mapUrl;
    if (isScreenshot) {
      mapWrap.classList.add('is-screenshot');
      mapWrap.classList.remove('is-map');
      document.getElementById('mapPins').innerHTML = '';
    } else {
      mapWrap.classList.add('is-map');
      mapWrap.classList.remove('is-screenshot');
      const px = coordToPctHW(item.x, item.zone);
      const py = coordToPctHW(item.y, item.zone);
      document.getElementById('mapPins').innerHTML = `
        <div class="sight-pin" style="left:${px}%;top:${py}%">
          <div class="sight-pin-dot"></div>
        </div>`;
    }
  } else {
    document.getElementById('mapPins').innerHTML = '';
  }
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderHW() {
  const data = ALL_DATA[curVer] || [];
  const main = document.getElementById('mainArea');

  if (data.length === 0) {
    main.innerHTML = `<div class="wip"><div class="wip-icon">🔧</div><div class="wip-title">資料準備中</div><div class="wip-sub">本版本觀景筆記資料整理中<br>敬請期待</div></div>`;
    // sidebar badge
    document.getElementById(`badge-${curVer}`).textContent = '–';
    document.getElementById('progressCount').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('doneList').innerHTML = '';
    return;
  }

  // sidebar 進度（HW+ 不追蹤完成，只顯示總數）
  document.getElementById(`badge-${curVer}`).textContent = data.length;
  document.getElementById('progressCount').textContent = `共 ${data.length} 個`;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('doneList').innerHTML = '';

  // 依地圖分組
  const zoneOrder = XPLUS_ZONE_ORDER[curVer] || Object.keys(grouped);
  const grouped = {};
  data.forEach(d => {
    if (!grouped[d.zone]) grouped[d.zone] = [];
    grouped[d.zone].push(d);
  });

  let html = '';
  const zones = zoneOrder.filter(z => grouped[z]);
  zones.forEach(zoneName => {
    const items = grouped[zoneName];
    const mapUrl = XPLUS_ZONE_MAP_URL[zoneName];
    const isScreenshot = ["黃金港","神拳痕","水晶都","遊末邦","舊薩雷安","拉札罕"].includes(zoneName);
    const isDTCity = ["圖萊尤拉","九號解決方案"].includes(zoneName);
    let pinsHtml = '';
    if (mapUrl && !isScreenshot) {
      // 傳送點 pin
      const aeths = XPLUS_AETHERYTES[zoneName] || [];
      aeths.forEach(a => {
        const px = coordToPctHW(a.x, zoneName);
        const py = coordToPctHW(a.y, zoneName);
        pinsHtml += `<div class="aeth-pin2" style="left:${px}%;top:${py}%">⬡<div class="aeth-label2">${a.name}</div></div>`;
      });
      // 景點 pin
      items.forEach(d => {
        const px = coordToPctHW(d.x, zoneName);
        const py = coordToPctHW(d.y, zoneName);
        pinsHtml += `<div class="sight-pin2" style="left:${px}%;top:${py}%" onclick='openHWModal(${JSON.stringify(d)})'>
          <div class="pin-dot2">${d.id}</div>
        </div>`;
      });
    }

    let listHtml = items.map(d => `
      <div class="sight-item" onclick='openHWModal(${JSON.stringify(d)})'>
        <span class="sight-item-num">No.${d.id}</span>
        <span class="sight-item-coord">X:${d.x} Y:${d.y}${d.z!=null?' Z:'+d.z:''}</span>
        <span class="sight-item-emote">${d.emote}</span>
        ${d.note ? `<span class="tag tag-note">${d.note}</span>` : ''}
      </div>`).join('');

    html += `<div class="zone-block">
      <div class="zone-header2">
        <span class="zone-name2">📍 ${zoneName}</span>
        <span class="zone-count">${items.length} 個景點</span>
      </div>
      ${isDTCity
        ? `<div style="padding:10px 14px;display:flex;align-items:center;gap:10px;">
            <button onclick="window.open('${DT_CITY_VIDEO}','_blank')" style="padding:5px 14px;border-radius:20px;background:rgba(0,120,255,.15);border:1px solid rgba(0,120,255,.4);color:#60a5fa;font-size:.75rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">▶ 教學影片</button>
            <span style="font-size:.72rem;color:var(--text2);">無地圖，請參考影片座標</span>
           </div>`
        : mapUrl
          ? isScreenshot
            ? `<div class="map-wrap2" style="aspect-ratio:auto"><img src="${mapUrl}" loading="lazy" style="width:100%;height:auto;max-height:600px;object-fit:contain;"></div>`
            : `<div class="map-wrap2"><img src="${mapUrl}" loading="lazy"><div class="pin-layer">${pinsHtml}</div></div>`
          : '<div style="padding:10px 14px;font-size:.75rem;color:var(--text2);">🔧 截圖待補</div>'
      }
      <div class="sight-list">${listHtml}</div>
    </div>`;
  });

  main.innerHTML = html;
}

function openMap(zone, title, x, y, e, id) {
  e.stopPropagation();
  const customImg = id ? SIGHT_IMG[id] : null;
  const url = customImg || ZONE_MAP_URL[zone];
  if (!url) return;
  document.getElementById('mapTitle').textContent = '📍 ' + title;
  document.getElementById('mapSub').textContent = ZONES[zone]?.name || zone;
  document.getElementById('mapImg').src = url;
  document.getElementById('mapCoord').textContent = `座標 X:${x}  Y:${y}`;

  // 影片按鈕
  const videoBtn = document.getElementById('mapVideoBtn');
  const video = id ? SIGHT_VIDEO[id] : null;
  if (video) {
    videoBtn.style.display = '';
    videoBtn.onclick = () => window.open(video, '_blank');
  } else {
    videoBtn.style.display = 'none';
  }

  // 截圖/地圖模式切換
  const mapWrap = document.querySelector('.map-wrap');
  if (customImg) {
    mapWrap.classList.add('is-screenshot');
    mapWrap.classList.remove('is-map');
    document.getElementById('mapPins').innerHTML = '';
  } else {
    mapWrap.classList.add('is-map');
    mapWrap.classList.remove('is-screenshot');
    const px = coordToPct(x), py = coordToPct(y);
    document.getElementById('mapPins').innerHTML = `
      <div class="sight-pin" style="left:${px}%;top:${py}%">
        <div class="sight-pin-dot"></div>
      </div>`;
  }
  document.getElementById('mapOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('mapDoneBtn').style.display = 'none';
}
function closeMap(e) { if (e.target === document.getElementById('mapOverlay')) closeMapBtn(); }
function closeMapBtn() { document.getElementById('mapOverlay').classList.remove('open'); document.body.style.overflow = ''; }

// 從膠囊按鈕開地圖，modal內有完成按鈕
let _mapDoneVer = null, _mapDoneId = null;
function openMapWithDone(ver, id, zone, title, x, y) {
  _mapDoneVer = ver; _mapDoneId = id;
  const isDone = getChecked(ver).includes(id);
  openMap(zone, title, x, y, { stopPropagation:()=>{} }, id);
  const btn = document.getElementById('mapDoneBtn');
  btn.style.display = '';
  btn.textContent = isDone ? '✓ 已完成' : '✓ 標記完成';
  btn.style.opacity = isDone ? '.5' : '1';
}
function mapDone() {
  if (!_mapDoneVer || !_mapDoneId) return;
  toggleCheck(_mapDoneVer, _mapDoneId);
  const isDone = getChecked(_mapDoneVer).includes(_mapDoneId);
  const btn = document.getElementById('mapDoneBtn');
  btn.textContent = isDone ? '✓ 已完成' : '✓ 標記完成';
  btn.style.opacity = isDone ? '.5' : '1';
}

// ══ 複製座標 ══
function copyCoords(x, y, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(`(${x}, ${y})`).catch(()=>{
    const t = document.createElement('textarea');
    t.value = `(${x}, ${y})`; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
  });
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// ══ ET 時鐘 ══
function updateClock() {
  const et = toET(now());
  document.getElementById('etClock').textContent = `${String(et.h).padStart(2,'0')}:${String(et.m).padStart(2,'0')}`;
}

// ══ Init ══
loadChecked();
computeWindows();
render();
updateClock();
setInterval(updateClock, 1000);
setInterval(() => { computeWindows(); render(); }, 60000);
</script>
